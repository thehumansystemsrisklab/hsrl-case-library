<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Library — Human Systems Risk Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Source+Sans+3:wght@300;400;600&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0b1120;--navy2:#0f1826;--navy3:#131f2e;
  --cream:#ede8df;--warm:#c4bba9;--muted:#7a8190;
  --border:rgba(255,255,255,0.07);
  --amber:#c07a18;--amber2:#e09030;
  --red:#c83030;--green:#28885a;
  --ff-display:'Cormorant Garamond',Georgia,serif;
  --ff-body:'Source Sans 3',system-ui,sans-serif;
  --ff-mono:'DM Mono','Courier New',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--navy);color:var(--warm);font-family:var(--ff-body);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.wrap{max-width:1180px;margin:0 auto;padding:0 48px}
.body-p{font-size:15px;color:var(--warm);line-height:1.9;margin-bottom:16px}
.body-p:last-child{margin-bottom:0}
.body-p strong{color:var(--cream)}
.btn{display:inline-block;font-family:var(--ff-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:12px 24px;border:1px solid;transition:all .2s;cursor:pointer}
.btn-amber{background:var(--amber);color:var(--navy);border-color:var(--amber)}
.btn-amber:hover{background:var(--amber2);border-color:var(--amber2)}
.btn-ghost{background:transparent;color:var(--amber);border-color:rgba(193,122,24,.35)}
.btn-ghost:hover{background:rgba(193,122,24,.08);border-color:var(--amber)}
.btn-outline{background:transparent;color:var(--cream);border-color:rgba(255,255,255,.2)}
.btn-outline:hover{border-color:var(--cream)}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px}
.loading-text{font-family:var(--ff-mono);font-size:11px;letter-spacing:.2em;color:var(--amber);text-transform:uppercase}
.loading-bar{width:200px;height:2px;background:rgba(255,255,255,.06);position:relative;overflow:hidden}
.loading-bar::after{content:'';position:absolute;left:-50%;width:50%;height:100%;background:var(--amber);animation:loadbar 1s ease-in-out infinite}
@keyframes loadbar{0%{left:-50%}100%{left:100%}}

/* RECORD BAR */
.record-bar{background:var(--navy3);border-bottom:1px solid var(--border);padding:9px 0}
.record-bar-inner{max-width:1180px;margin:0 auto;padding:0 48px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.record-id{font-family:var(--ff-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
.record-id strong{color:var(--amber)}
.record-actions{display:flex;gap:10px}
.record-btn{font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid rgba(255,255,255,.1);padding:5px 12px;cursor:pointer;transition:all .15s}
.record-btn:hover{border-color:var(--amber);color:var(--amber)}

/* HERO */
.case-hero{background:var(--navy2);padding:56px 0 0;position:relative;overflow:hidden}
.hero-glow{position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse 55% 70% at 12% 55%,rgba(200,48,48,.05) 0%,transparent 60%)}
.hero-grid{display:grid;grid-template-columns:1.15fr 1fr;gap:56px;align-items:start}
.breadcrumb{font-family:var(--ff-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:24px}
.breadcrumb a{color:var(--amber);text-decoration:none;cursor:pointer}
.case-flag{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.flag-dot{width:9px;height:9px;border-radius:50%;background:var(--red);flex-shrink:0;box-shadow:0 0 10px rgba(200,48,48,.45)}
.flag-dot.resilient{background:var(--green);box-shadow:0 0 10px rgba(40,136,90,.45)}
.flag-type{font-family:var(--ff-mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--red)}
.flag-type.resilient{color:var(--green)}
.flag-domain{font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;color:var(--muted)}
.case-h1{font-family:var(--ff-display);font-size:clamp(38px,5.5vw,70px);font-weight:700;color:var(--cream);line-height:1.06;margin-bottom:10px}
.case-h2{font-family:var(--ff-display);font-style:italic;font-size:clamp(15px,2vw,22px);color:var(--amber2);margin-bottom:24px;line-height:1.4}
.case-meta{display:flex;flex-wrap:wrap;gap:18px;margin-bottom:28px}
.meta-chip{font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;color:var(--muted);display:flex;align-items:center;gap:6px}
.meta-chip::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--amber);flex-shrink:0}
.gpws-panel{background:var(--navy3);border:1px solid var(--border);padding:28px 28px 24px}
.gpws-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.gpws-score{font-family:var(--ff-display);font-size:80px;font-weight:700;color:var(--red);line-height:1;margin-bottom:6px}
.gpws-tier{font-family:var(--ff-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--red);margin-bottom:18px}
.gpws-bar-track{height:5px;background:rgba(255,255,255,.06);margin-bottom:6px}
.gpws-bar-fill{height:100%;background:var(--red)}
.gpws-note{font-size:12px;color:var(--muted);line-height:1.6;margin-top:14px}
.cond-table{margin-top:16px;display:flex;flex-direction:column;gap:2px}
.cond-row{display:grid;grid-template-columns:32px 1fr auto;align-items:center;background:var(--navy2);padding:10px 14px;gap:12px}
.cond-id{font-family:var(--ff-mono);font-size:10px;font-weight:500;color:var(--amber)}
.cond-name{font-size:13px;color:var(--warm)}
.cond-badge{font-family:var(--ff-mono);font-size:9px;letter-spacing:.1em;padding:3px 9px;text-transform:uppercase}
.badge-a{color:var(--red);background:rgba(200,48,48,.1);border:1px solid rgba(200,48,48,.22)}
.badge-p{color:var(--green);background:rgba(40,136,90,.1);border:1px solid rgba(40,136,90,.22)}
.badge-x{color:var(--amber);background:rgba(192,122,24,.1);border:1px solid rgba(192,122,24,.22)}

/* TAPE */
.tape{background:var(--red);padding:9px 0;overflow:hidden}
.tape-track{display:flex;gap:36px;white-space:nowrap;animation:scrolltape 22s linear infinite}
.tape-item{font-family:var(--ff-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.88);flex-shrink:0}
.tape-sep{color:rgba(255,255,255,.3);flex-shrink:0}
@keyframes scrolltape{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* SECTION NAV */
.sec-nav{position:sticky;top:0;z-index:100;background:rgba(11,17,32,.97);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
.sec-nav-track{display:flex;max-width:1180px;margin:0 auto;padding:0 48px;overflow-x:auto;scrollbar-width:none}
.sec-nav-track::-webkit-scrollbar{display:none}
.sec-nav-link{font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-decoration:none;padding:13px 18px;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;flex-shrink:0;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none}
.sec-nav-link:hover{color:var(--cream)}
.sec-nav-link.on{color:var(--amber);border-bottom-color:var(--amber)}

/* LAYOUT */
.case-body{max-width:1180px;margin:0 auto;padding:0 48px}
.sec{padding:72px 0;border-bottom:1px solid var(--border)}
.sec:last-child{border-bottom:none}
.sec-header{margin-bottom:36px}
.sec-eyebrow{font-family:var(--ff-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.sec-title{font-family:var(--ff-display);font-size:clamp(22px,3vw,38px);font-weight:600;color:var(--cream);line-height:1.15;max-width:640px}
.sec-title em{font-style:italic;color:var(--amber2)}
.two-col{display:grid;grid-template-columns:260px 1fr;gap:56px;align-items:start}
.col-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.col-title{font-family:var(--ff-display);font-size:18px;font-weight:600;color:var(--cream);line-height:1.25;margin-bottom:8px}
.col-note{font-size:13px;color:var(--muted);line-height:1.65}
.sticky-col{position:sticky;top:104px}

/* HARM STATS */
.harm-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-bottom:40px}
.hstat{background:var(--navy2);padding:24px 20px;text-align:center}
.hstat-n{font-family:var(--ff-display);font-size:clamp(22px,3vw,42px);font-weight:700;color:var(--red);line-height:1;margin-bottom:5px}
.hstat-n.amber{color:var(--amber2)}
.hstat-l{font-family:var(--ff-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);line-height:1.5}

/* TIMELINE */
.tl{display:flex;flex-direction:column;position:relative}
.tl::before{content:'';position:absolute;left:10px;top:22px;bottom:22px;width:1px;background:linear-gradient(to bottom,var(--amber) 0%,rgba(192,122,24,.08) 100%)}
.tl-item{display:flex;gap:24px;padding-bottom:28px;position:relative}
.tl-item:last-child{padding-bottom:0}
.tl-dot{width:21px;height:21px;border-radius:50%;border:2px solid var(--amber);background:var(--navy);flex-shrink:0;margin-top:3px;z-index:1;display:flex;align-items:center;justify-content:center}
.tl-dot.r{border-color:var(--red)}.tl-dot.g{border-color:var(--green)}
.tl-pip{width:7px;height:7px;border-radius:50%;background:var(--amber)}
.tl-dot.r .tl-pip{background:var(--red)}.tl-dot.g .tl-pip{background:var(--green)}
.tl-date{font-family:var(--ff-mono);font-size:10px;letter-spacing:.1em;color:var(--amber);margin-bottom:3px}
.tl-date.r{color:var(--red)}.tl-date.g{color:var(--green)}
.tl-event{font-size:14px;font-weight:600;color:var(--cream);margin-bottom:4px;line-height:1.35}
.tl-detail{font-size:13px;color:var(--warm);line-height:1.7}

/* 57-TRIGGER MATRIX */
.trigger-section-block{margin-bottom:4px}
.tsec-header{display:flex;align-items:center;gap:14px;padding:12px 16px;background:var(--navy3);cursor:pointer;user-select:none}
.tsec-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);flex:1}
.tsec-count{font-family:var(--ff-mono);font-size:10px;color:var(--muted)}
.tsec-toggle{font-family:var(--ff-mono);font-size:10px;color:var(--muted);transition:transform .2s;display:inline-block}
.tsec-toggle.open{transform:rotate(180deg)}
.tsec-rows{display:flex;flex-direction:column;gap:1px;margin-top:1px}
.trigger-row{display:grid;grid-template-columns:52px 1fr auto;align-items:center;gap:12px;padding:10px 16px;background:var(--navy2)}
.tr-id{font-family:var(--ff-mono);font-size:10px;color:var(--muted);letter-spacing:.08em}
.tr-name{font-size:13px;color:var(--warm);line-height:1.4}
.tr-score{font-family:var(--ff-mono);font-size:9px;letter-spacing:.1em;padding:3px 9px;text-transform:uppercase;white-space:nowrap}
.tr-yes{color:#3db57a;background:rgba(40,136,90,.1);border:1px solid rgba(40,136,90,.2)}
.tr-nhr{color:var(--amber);background:rgba(192,122,24,.08);border:1px solid rgba(192,122,24,.18)}
.tr-unk{color:var(--muted);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
.trigger-legend{display:flex;gap:24px;margin-bottom:20px;flex-wrap:wrap}
.tleg{display:flex;align-items:center;gap:7px;font-family:var(--ff-mono);font-size:10px;color:var(--muted);letter-spacing:.08em}
.tleg-dot{width:8px;height:8px;border-radius:1px;flex-shrink:0}
.trigger-summary{display:flex;gap:2px;margin-bottom:24px;height:8px}

/* CONDITION DEEP DIVES */
.cdive{background:var(--navy2);border:1px solid var(--border);padding:28px;margin-bottom:12px}
.cdive-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px}
.cdive-id{font-family:var(--ff-mono);font-size:10px;color:var(--amber);letter-spacing:.1em;margin-bottom:4px}
.cdive-name{font-family:var(--ff-display);font-size:18px;font-weight:600;color:var(--cream);line-height:1.2}
.cdive-finding{font-family:var(--ff-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-top:5px}
.cdive-text{font-size:13px;color:var(--warm);line-height:1.78;margin-bottom:10px}
.cdive-quote{border-left:2px solid var(--amber);padding-left:16px;margin:14px 0;font-family:var(--ff-display);font-style:italic;font-size:15px;color:var(--warm);line-height:1.6}
.cdive-source{font-family:var(--ff-mono);font-size:10px;color:var(--muted);letter-spacing:.06em}
.launder-box{padding:22px 24px;background:rgba(200,48,48,.04);border:1px solid rgba(200,48,48,.14);border-left:3px solid var(--red);margin-top:20px}
.launder-lbl{font-family:var(--ff-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.launder-tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px}
.ltag{font-family:var(--ff-mono);font-size:10px;color:rgba(200,48,48,.8);background:rgba(200,48,48,.07);border:1px solid rgba(200,48,48,.18);padding:3px 9px}
.launder-desc{font-size:13px;color:var(--warm);line-height:1.7}

/* PREVENTION */
.prev-item{display:flex;gap:18px;padding:18px 0;border-bottom:1px solid var(--border)}
.prev-item:last-child{border-bottom:none}
.prev-cond{font-family:var(--ff-mono);font-size:11px;color:var(--amber);flex-shrink:0;width:28px;padding-top:2px}
.prev-title{font-size:14px;font-weight:600;color:var(--cream);margin-bottom:4px;line-height:1.35}
.prev-desc{font-size:13px;color:var(--warm);line-height:1.7}

/* COMPARABLE */
.comp-card{display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;background:var(--navy2);border:1px solid var(--border);border-left:3px solid rgba(192,122,24,.35);padding:22px 24px;margin-bottom:12px;cursor:pointer;transition:border-color .15s}
.comp-card:hover{border-left-color:var(--amber)}
.comp-name{font-size:15px;font-weight:600;color:var(--cream);margin-bottom:3px}
.comp-meta{font-family:var(--ff-mono);font-size:10px;color:var(--muted);letter-spacing:.07em;margin-bottom:8px}
.comp-overlaps{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:7px}
.comp-tag{font-family:var(--ff-mono);font-size:9px;color:var(--amber);background:rgba(192,122,24,.07);border:1px solid rgba(192,122,24,.18);padding:2px 8px;letter-spacing:.07em}
.comp-desc{font-size:13px;color:var(--warm);line-height:1.65}
.comp-score-col{text-align:right;flex-shrink:0}
.comp-score-n{font-family:var(--ff-display);font-size:32px;font-weight:700;color:var(--red);line-height:1}
.comp-score-l{font-family:var(--ff-mono);font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:2px}

/* METADATA */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)}
.meta-cell{background:var(--navy2);padding:16px 20px}
.meta-cell-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.meta-cell-value{font-size:13px;color:var(--cream);line-height:1.5}
.meta-cell-value.red{color:var(--red);font-weight:600}

/* RELATED */
.related-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.rc{background:var(--navy2);border:1px solid var(--border);padding:20px;cursor:pointer;transition:border-color .15s;display:block}
.rc:hover{border-color:rgba(192,122,24,.4)}
.rc-type{display:flex;align-items:center;gap:6px;font-family:var(--ff-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:9px}
.rc-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rc-name{font-size:14px;font-weight:600;color:var(--cream);margin-bottom:3px;line-height:1.3}
.rc-meta{font-family:var(--ff-mono);font-size:10px;color:var(--muted);letter-spacing:.06em;margin-bottom:9px}
.rc-conds{display:flex;gap:4px;flex-wrap:wrap}
.rct{font-family:var(--ff-mono);font-size:9px;padding:2px 7px}
.rct-a{color:var(--red);background:rgba(200,48,48,.08);border:1px solid rgba(200,48,48,.18)}
.rct-p{color:var(--green);background:rgba(40,136,90,.08);border:1px solid rgba(40,136,90,.18)}

/* DATA-ONLY CASE PAGE */
.data-notice{background:rgba(192,122,24,.06);border:1px solid rgba(192,122,24,.2);border-left:3px solid var(--amber);padding:22px 28px;margin-bottom:32px}
.data-notice-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--amber);margin-bottom:8px}
.data-notice-text{font-size:13px;color:var(--warm);line-height:1.7}

/* LIBRARY INDEX */
.lib-hero{background:var(--navy2);padding:72px 0 64px;border-bottom:1px solid var(--border)}
.lib-hero-eyebrow{font-family:var(--ff-mono);font-size:9px;letter-spacing:.24em;text-transform:uppercase;color:var(--amber);margin-bottom:16px}
.lib-hero-title{font-family:var(--ff-display);font-size:clamp(36px,5vw,72px);font-weight:700;color:var(--cream);line-height:1.05;margin-bottom:20px}
.lib-stats{display:flex;gap:36px;flex-wrap:wrap;margin-top:28px}
.lib-stat{font-family:var(--ff-mono);font-size:10px;letter-spacing:.12em;color:var(--muted)}
.lib-stat strong{color:var(--amber);font-size:20px;display:block;margin-bottom:2px;font-family:var(--ff-display);font-weight:700}
/* DIAGNOSTIC CTA BANNER */
.diag-cta-bar{background:var(--navy3);border-bottom:1px solid rgba(192,122,24,.18);position:relative;overflow:hidden}
.diag-cta-bar::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 100% 50%,rgba(192,122,24,.07) 0%,transparent 65%);pointer-events:none}
.diag-cta-inner{display:grid;grid-template-columns:1fr auto;gap:48px;align-items:center;padding:36px 0}
.diag-cta-eyebrow{font-family:var(--ff-mono);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:9px}
.diag-cta-title{font-family:var(--ff-display);font-size:clamp(20px,2.5vw,28px);font-weight:700;color:var(--cream);line-height:1.2;margin-bottom:8px}
.diag-cta-desc{font-size:14px;color:var(--muted);line-height:1.7;max-width:500px}
.diag-cta-right{display:flex;flex-direction:column;align-items:flex-end;gap:14px;min-width:260px}
.diag-cta-stats{display:flex;flex-direction:column;gap:7px;align-self:stretch}
.diag-cta-stat{font-family:var(--ff-mono);font-size:10px;letter-spacing:.06em;color:var(--muted);display:flex;align-items:center;gap:10px}
.diag-cta-stat span{font-family:var(--ff-display);font-size:16px;font-weight:700;color:var(--amber2);flex-shrink:0}
.diag-cta-btn{display:inline-block;background:var(--amber);color:var(--navy);font-family:var(--ff-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;padding:14px 28px;text-decoration:none;transition:background .2s;white-space:nowrap;width:100%;text-align:center}
.diag-cta-btn:hover{background:var(--amber2)}
.diag-cta-note{font-family:var(--ff-mono);font-size:9px;letter-spacing:.08em;color:var(--muted);text-align:center}
.filter-bar{background:var(--navy3);border-bottom:1px solid var(--border);padding:16px 0;position:sticky;top:0;z-index:50}
.filter-inner{max-width:1180px;margin:0 auto;padding:0 48px;display:flex;flex-direction:column;gap:10px}
.search-input{flex:1;background:var(--navy2);border:1px solid var(--border);color:var(--cream);font-family:var(--ff-mono);font-size:12px;padding:9px 14px;outline:none;transition:border-color .15s;width:100%}
.search-input::placeholder{color:var(--muted)}
.search-input:focus{border-color:rgba(192,122,24,.4)}
.chip-row{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-family:var(--ff-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border:1px solid rgba(255,255,255,.1);background:none;color:var(--muted);cursor:pointer;transition:all .15s}
.chip:hover{border-color:rgba(192,122,24,.4);color:var(--cream)}
.chip.active{background:rgba(192,122,24,.12);border-color:rgba(192,122,24,.5);color:var(--amber)}

.case-card:hover{border-color:rgba(192,122,24,.35)}

.card-type-label{font-family:var(--ff-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.card-domain-label{font-family:var(--ff-mono);font-size:9px;color:var(--muted);margin-left:auto;text-align:right;max-width:120px;line-height:1.3}
.card-name{font-family:var(--ff-display);font-size:18px;font-weight:700;color:var(--cream);line-height:1.2;margin-bottom:4px}
.card-meta{font-family:var(--ff-mono);font-size:10px;color:var(--muted);letter-spacing:.06em;margin-bottom:12px}
.card-conditions{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.cc{font-family:var(--ff-mono);font-size:9px;padding:2px 7px}
.cc-a{color:var(--red);background:rgba(200,48,48,.08);border:1px solid rgba(200,48,48,.18)}
.cc-p{color:var(--green);background:rgba(40,136,90,.08);border:1px solid rgba(40,136,90,.18)}
.card-bottom{display:flex;justify-content:space-between;align-items:center}
.card-score{font-family:var(--ff-display);font-size:26px;font-weight:700;line-height:1}
.card-link{font-family:var(--ff-mono);font-size:9px;letter-spacing:.12em;color:var(--amber);text-transform:uppercase}
.card-data-link{font-family:var(--ff-mono);font-size:9px;letter-spacing:.1em;color:var(--muted);text-transform:uppercase}

@media(max-width:1024px){
  .wrap,.case-body,.filter-inner,.case-grid,.record-bar-inner,.sec-nav-track{padding-left:32px;padding-right:32px}
  .hero-grid,.two-col{grid-template-columns:1fr;gap:36px}
  .sticky-col{position:static}
  .harm-stats{grid-template-columns:1fr 1fr}
  .related-grid,.case-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .wrap,.case-body,.filter-inner,.case-grid,.record-bar-inner,.sec-nav-track{padding-left:20px;padding-right:20px}

  .comp-card{grid-template-columns:1fr}
  .meta-grid{grid-template-columns:1fr}
}

  .record-bar .record-actions,.sec-nav,.tape,.filter-bar,.lib-hero,.case-grid{display:none!important}
  *{background:white!important;color:#111!important;border-color:#ccc!important;box-shadow:none!important;text-shadow:none!important}
  body{font-size:12pt!important}
  .case-hero{padding:24px 0 16px!important}

<script>
// ═══════════════════════════════════════════════════════════════════
// TRIGGER DEFINITIONS
// ═══════════════════════════════════════════════════════════════════
const TRIGGER_NAMES = {
  'A-01':'System affects human outcomes','A-02':'Non-trivial human outcome possible',
  'B-01':'Output influences / substitutes human judgment','B-02':'Cannot interrupt or override in real time',
  'B-03':'Behavior differs under time pressure','B-04':'System must be stoppable post-deployment',

  'K-03':'Evidence contamination or fabrication plausible','K-04':'Persuasive framing could override scrutiny',
  'K-05':'Volume or flooding could degrade safeguards','K-06':'Org seams or vendors can be exploited',

  'L-02':'Authority denied after harm','L-03':'Evidence degraded or narrativized',
  'L-04':'Responsibility shifted across time','L-05':'Responsibility shifted across teams or vendors',
  'L-06':'Blame shifted onto tools','L-07':'Automation cited as inevitability',
  'L-08':'Harm erased through aggregation or statistics','L-09':'Compliance artifacts substitute for safety',
  'L-10':'Confidence substitutes for evidence','L-11':'Unnamed experts invoked as authority',
  'L-12':'Scale framed as unavoidable','L-13':'Good intent used to negate outcomes',
  'L-14':'Committees dissolve accountability','L-15':'Low probability excuses high-impact harm',
  'L-16':'Moral responsibility shifted to users or victims',
  'M-01':'Residual risk remains after mitigation','M-02':'System remains operational over time',

  'N-03':'Raising safety concerns carries career risk',

const TRIGGER_SECTIONS = [
  {key:'A',name:'Entry & Safety Relevance Gates',keys:['A-01','A-02']},
  {key:'B',name:'Authority, Control & Human Oversight',keys:['B-01','B-02','B-03','B-04']},
  {key:'C',name:'Evidence, Traceability & Reconstructability',keys:['C-01','C-02','C-03']},
  {key:'D',name:'Failure Modes, Absence & Degraded Operation',keys:['D-01','D-02','D-03']},
  {key:'E',name:'Scale, Propagation & Amplification',keys:['E-01','E-02','E-03']},
  {key:'F',name:'Queueing, Triage & Time-Based Harm',keys:['F-01','F-02']},
  {key:'G',name:'Monitoring, Drift & Long-Term Operation',keys:['G-01','G-02','G-03']},
  {key:'H',name:'Incentives, Objectives & Misalignment',keys:['H-01','H-02','H-03']},
  {key:'I',name:'Human Interpretation & Use',keys:['I-01','I-02']},
  {key:'J',name:'Security, Access & Cross-Domain Risk',keys:['J-01','J-02']},
  {key:'K',name:'Adversarial, Crime & Abuse',keys:['K-01','K-02','K-03','K-04','K-05','K-06']},
  {key:'L',name:'Responsibility & Evidence Laundering Suite',keys:['L-00','L-01','L-02','L-03','L-04','L-05','L-06','L-07','L-08','L-09','L-10','L-11','L-12','L-13','L-14','L-15','L-16']},
  {key:'M',name:'Residual Risk & Lifecycle Governance',keys:['M-01','M-02','M-03','M-04']},
  {key:'N',name:'Organizational Capacity',keys:['N-01','N-02','N-03']},
];


// ═══════════════════════════════════════════════════════════════════
// DOMAIN GROUPS
// ═══════════════════════════════════════════════════════════════════
const DOMAIN_GROUPS = {

  "Healthcare & Medical": ["Healthcare","Healthcare Infrastructure","Healthcare Administration","Healthcare Billing","Healthcare/Consumer","Medical Devices","Clinical AI","Public Health","Public Health Infrastructure","Public Health Surveillance","Health Claims / Tax"],
  "Benefits, Welfare & Social Services": ["Benefits & Welfare","Benefits Administration","Benefits / Tax","Child Welfare","Social Services","Housing","Employment","Financial Aid"],
  "Government & Public Administration": ["Government IT","Digital Government","Public Administration","Electoral Systems","Tax Administration","Tax / Benefits","Tax / Payment Integrity","Digital Identity & Infrastructure"],
  "Financial Systems": ["Financial Systems","Financial Regulation","Financial Infrastructure","Financial Data","Financial IT"],
  "Transportation & Aviation": ["Aviation","Aviation Infrastructure","Aviation Operations","Aviation/Space","Automotive","Autonomous Vehicles","Autonomous & Transport","Transit Infrastructure","Transport Infrastructure"],
  "Critical Infrastructure & Technology": ["Critical Infrastructure","Critical Software Infrastructure","Technology","Technology/Consumer","Technology/Critical Infra","Technology/Financial","Telecommunications","Infrastructure","Public Infrastructure","Public Safety","Public Safety & Infrastructure","Emergency Alert"],
  "Immigration & Border": ["Immigration & Border"],
  "Education": ["Education"],
  "Military & National Security": ["Military","Military & National Security","Military/Industrial"],
  "Environment": ["Environmental","Environmental & Infrastructure","Environmental Monitoring","Environmental Regulation","Environmental/Infrastructure","Environmental/Transportation"],
  "Other": ["Academic & Research","Content Moderation","Data Broker","Hospitality","International","Cross-domain RTF"],

// ═══════════════════════════════════════════════════════════════════
// SLUG → CONTENT FILE MAP
// Generated from dataset domain assignments.
// Add new entries here when new cases are built.
// ═══════════════════════════════════════════════════════════════════
const SLUG_TO_FILE = {
  // Law Enforcement & Criminal Justice
  'compas':                                    'law-enforcement',
  'detroit-pd-facial-recognition-williams':    'law-enforcement',
  'clearview-ai-immigration-enforcement-use':  'law-enforcement',
  'predpol-geolitica-predictive-policing':     'law-enforcement',
  // Benefits, Welfare & Social Services
  'robodebt':                                  'benefits-welfare',
  'michigan-midas':                            'benefits-welfare',
  'netherlands-toeslagenaffaire':              'benefits-welfare',
  'arkansas-medicaid-algorithm':               'benefits-welfare',
  // Healthcare & Medical
  'unitedhealthcare-nh-predict-ai-denial-system': 'healthcare',
  // Critical Infrastructure & Technology
  'horizon':                                   'infrastructure-tech',
  'mcas':                                      'infrastructure-tech',
  // Other / Cross-domain
  'therac25':                                  'other',
  // Law Enforcement — batch 2 (new)
  'prism-nsa-mass-surveillance-program':             'law-enforcement',
  'baltimore-stingray-cell-surveillance-program':    'law-enforcement',
  'chicago-strategic-subject-list-ssl-heat-list':    'law-enforcement',
  'los-angeles-county-raps-gang-database-calgang':   'law-enforcement',
  'dna-probabilistic-genotyping-software-trueallele-strmix': 'law-enforcement',
  'palantir-gotham-new-orleans-crime-prediction':    'law-enforcement',
  'axon-draft-one-ai-police-reports':                'law-enforcement',
  'icedhs-deportation-recommendation-algorithm':     'law-enforcement',
};

// Cache of loaded content files — prevents re-fetching on navigation
const CONTENT_CACHE = {};

async function getContent(slug) {
  const fileKey = SLUG_TO_FILE[slug];
  if (!fileKey) return null;
  if (CONTENT_CACHE[fileKey]) return CONTENT_CACHE[fileKey][slug] || null;
  try {
    const res = await fetch(`cases-content-${fileKey}.json`);
    const data = await res.json();
    CONTENT_CACHE[fileKey] = data;
    return data[slug] || null;
  } catch(e) {
    console.error(`Failed to load cases-content-${fileKey}.json`, e);
    return null;
  }
}

// ═══════════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════════
let ALL_CASES = [];      // from cases-data.json  — all 380
let filterState = { search:'', type:'all', domain:'all', domainGroup:'all', conditions:new Set() };

// ═══════════════════════════════════════════════════════════════════
// BOOT — load both JSON files in parallel
// ═══════════════════════════════════════════════════════════════════
async function boot() {
  try {
    const dataRes = await fetch('cases-data.json');
    ALL_CASES = await dataRes.json();
    render();
  } catch(e) {
    document.getElementById('app').innerHTML = `
      <div style="padding:80px 48px;text-align:center">
        <div style="font-family:var(--ff-mono);font-size:11px;color:var(--red);letter-spacing:.2em;margin-bottom:16px">LOAD ERROR</div>
        <h2 style="font-family:var(--ff-display);font-size:32px;color:var(--cream);margin-bottom:12px">Could not load case data</h2>
        <p style="color:var(--warm);font-size:13px;margin-bottom:8px">Make sure <code>cases-data.json</code> and <code>cases-content.json</code> are in the same folder as this file.</p>
        <p style="color:var(--muted);font-size:12px">${e.message}</p>
      </div>`;
  }
}

// ═══════════════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════════════
function getSlug() {
  // Support: / (library) or /compas (case detail)
  const parts = window.location.pathname.split('/').filter(p => p && !p.includes('.') && p !== 'index');
  if (!parts.length) return null;
  // Ignore legacy /cases/slug pattern during transition
  if (parts[0] === 'cases' && parts.length >= 2) return parts[1];
  if (parts[0] === 'cases') return null;
  return parts[0];
}
function navigate(slug) {
  const url = slug ? `/${slug}` : '/';
  window.history.pushState({}, '', url);
  render();
  window.scrollTo(0,0);
}
window.addEventListener('popstate', () => { render(); window.scrollTo(0,0); });

// ═══════════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════════
function badgeClass(s) {
  if (!s) return 'badge-a';
  if (s.startsWith('ABSENT')) return 'badge-a';
  if (s === 'PRESENT') return 'badge-p';
  return 'badge-x';
}
function scoreColor(g) {
  if (g <= 0.2) return 'var(--red)';
  if (g <= 0.6) return 'var(--amber2)';
  return 'var(--green)';
}
function typeColor(t) {
  if (!t) return 'var(--muted)';
  if (t.includes('Failure')) return 'var(--red)';
  if (t === 'Resilient' || t.includes('Resilient')) return 'var(--green)';
  return 'var(--amber)';
}
function copyLink() {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const b = document.getElementById('copyBtn');
    if (b) { b.textContent='Copied!'; setTimeout(()=>b.textContent='Copy Link',2000); }
  });
}
function printCase() { window.print(); }
function scrollToSec(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({behavior:'smooth',block:'start'});
}

// ═══════════════════════════════════════════════════════════════════
// TRIGGER MATRIX
// ═══════════════════════════════════════════════════════════════════
function renderTriggerMatrix(triggers) {
  if (!triggers) return '<p style="color:var(--muted);font-size:13px">Trigger data not available for this record.</p>';
  const total = Object.keys(triggers).length;
  const yesC = Object.values(triggers).filter(v=>v==='YES').length;
  const nhrC = Object.values(triggers).filter(v=>v==='NEEDS HUMAN REVIEW').length;
  const unkC = total - yesC - nhrC;
  let html = `
    <div class="trigger-legend">
      <div class="tleg"><div class="tleg-dot" style="background:#28885a"></div>YES — ${yesC}</div>
      <div class="tleg"><div class="tleg-dot" style="background:var(--amber)"></div>NEEDS HUMAN REVIEW — ${nhrC}</div>
      <div class="tleg"><div class="tleg-dot" style="background:var(--muted);opacity:.5"></div>UNKNOWN — ${unkC}</div>
    </div>
    <div class="trigger-summary">
      <div style="width:${Math.max(2,yesC/total*100)}%;background:#28885a;height:100%"></div>
      <div style="width:${nhrC/total*100}%;background:var(--amber);height:100%"></div>
      <div style="width:${unkC/total*100}%;background:var(--muted);opacity:.4;height:100%"></div>
    </div>`;
  TRIGGER_SECTIONS.forEach((sec,idx) => {
    const sYes=sec.keys.filter(k=>triggers[k]==='YES').length;
    const sNhr=sec.keys.filter(k=>triggers[k]==='NEEDS HUMAN REVIEW').length;
    const sUnk=sec.keys.filter(k=>!triggers[k]||triggers[k]==='UNKNOWN').length;
    const parts=[]; if(sYes)parts.push(`${sYes} YES`); if(sNhr)parts.push(`${sNhr} NHR`); if(sUnk)parts.push(`${sUnk} UNKNOWN`);
    const isL=sec.key==='L', open=idx<2;
    let rows='';
    sec.keys.forEach(k=>{
      const v=triggers[k];
      let cls='tr-unk',txt='—';
      if(v==='YES'){cls='tr-yes';txt='YES';}
      else if(v==='NEEDS HUMAN REVIEW'){cls='tr-nhr';txt='NHR';}
      else if(v==='UNKNOWN'){cls='tr-unk';txt='UNKNOWN';}
      rows+=`<div class="trigger-row"><span class="tr-id">${k}</span><span class="tr-name">${TRIGGER_NAMES[k]||''}</span><span class="tr-score ${cls}">${txt}</span></div>`;
    });
    html+=`<div class="trigger-section-block">
      <div class="tsec-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'flex':'none';this.querySelector('.tsec-toggle').classList.toggle('open')"
        style="${isL?'border-left:3px solid var(--red)':''}">
        <span class="tsec-label" style="${isL?'color:var(--red)':''}">Section ${sec.key} — ${sec.name}</span>
        <span class="tsec-count">${sec.keys.length} triggers · ${parts.join(' · ')}</span>
        <span class="tsec-toggle ${open?'open':''}">▼</span>
      </div>
      <div class="tsec-rows" style="display:${open?'flex':'none'};flex-direction:column;gap:1px">${rows}</div>
    </div>`;
  });
  return html;
}

// ═══════════════════════════════════════════════════════════════════
// DATA-ONLY CASE PAGE (no narrative content yet)
// ═══════════════════════════════════════════════════════════════════

          <button class="record-btn" onclick="printCase()">Print / PDF</button>
          <button class="record-btn" onclick="navigate(null)">← Case Library</button>
        </div>
      </div>
    </div>
    <section class="case-hero">
      <div class="hero-glow"></div>
      <div class="wrap">
        <div class="hero-grid">
          <div>
            <div class="breadcrumb"><span onclick="navigate(null)" style="color:var(--amber);cursor:pointer">Case Library</span> › ${d.name}</div>
            <div class="case-flag">
              <div class="flag-dot" style="background:${typeColor(d.type)}"></div>
              <span class="flag-type" style="color:${typeColor(d.type)}">${d.type}</span>
              <span class="flag-domain">· ${d.domain}</span>
            </div>
            <h1 class="case-h1">${d.name}</h1>
            <p class="case-h2">${d.domain} · ${d.country}${d.deployYear ? ' · ' + d.deployYear : ''}</p>
            <div class="case-meta">
              <span class="meta-chip">Case ID: ${d.id}</span>
              <span class="meta-chip">Country: ${d.country}</span>
              <span class="meta-chip">Domain: ${d.domain}</span>
              ${d.suppressionConfirmed ? '<span class="meta-chip" style="color:var(--red)">Suppression: Confirmed</span>' : ''}
            </div>
            ${d.harmDescription ? `<div style="background:var(--navy3);border:1px solid var(--border);border-left:3px solid var(--red);padding:18px 22px;margin-top:8px"><div style="font-family:var(--ff-mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);margin-bottom:8px">Harm Description</div><p style="font-size:13px;color:var(--warm);line-height:1.7">${d.harmDescription}</p></div>` : ''}
          </div>
          <div>
            <div class="gpws-panel">
              <div class="gpws-label">Governance Process Watchdog Score (GPWS)</div>
              <div class="gpws-score" style="color:${scoreColor(d.gpws)}">${d.gpws.toFixed(1)}</div>
              <div class="gpws-tier" style="color:${scoreColor(d.gpws)}">${d.gpws <= 0.2 ? '⛔ Structural Risk — DANGER' : d.gpws <= 0.6 ? '⚠ Elevated Risk' : '✓ Governance Present'}</div>
              <div class="gpws-bar-track"><div class="gpws-bar-fill" style="width:${Math.max(2,d.gpws*100)}%;background:${scoreColor(d.gpws)}"></div></div>
              <div class="gpws-note">Scale 0.0–1.0. 0.0 = all five conditions absent.</div>
              <div class="cond-table">${condRows}</div>
            </div>
          </div>
        </div>
      </div>
      <div style="height:32px"></div>
    </section>

    <div class="case-body">
      <section class="sec" id="data-notice" style="padding:48px 0">
        <div class="data-notice">
          <div class="data-notice-label">Dataset Record — Narrative Analysis Pending</div>
          <p class="data-notice-text">This case is in the HSRL dataset with full trigger scoring and condition assessment. A full narrative case analysis — including condition deep-dives, timeline, prevention analysis, and comparable cases — has not yet been written for this record. The 57-trigger matrix and classification data are available below.</p>
        </div>
      </section>
      <section class="sec" id="triggers">
        <div class="sec-header">
          <div class="sec-eyebrow">57-Trigger Matrix</div>
          <h2 class="sec-title">Full trigger<br><em>assessment record.</em></h2>
        </div>
        ${renderTriggerMatrix(d.triggers)}
      </section>
      <section class="sec" id="record">
        <div class="sec-header">
          <div class="sec-eyebrow">Record</div>
          <h2 class="sec-title">Classification<br><em>data.</em></h2>
        </div>
        <div class="meta-grid">

}

function renderFullCase(d, c) {

  const conditionsHtml = (c.conditions||[]).map(cond=>`

  const compHtml = (c.comparables||[]).map(comp=>`

  const metaHtml = Object.entries(c.metadata||{}).map(([k,v])=>`
    <div class="meta-cell">

function filterAndRenderCards() {
  const q = filterState.search.toLowerCase();
  const filtered = ALL_CASES.filter(c => {
    if (q && !`${c.name} ${c.domain} ${c.country} ${c.id}`.toLowerCase().includes(q)) return false;
    if (filterState.type !== 'all' && c.type !== filterState.type) return false;
    if (filterState.domainGroup !== 'all') {
      const groupDomains = DOMAIN_GROUPS[filterState.domainGroup] || [];
      if (!groupDomains.includes(c.domain)) return false;
    }
    if (filterState.domain !== 'all' && c.domain !== filterState.domain) return false;
    for (const cond of filterState.conditions) {
      if (cond==='c1-absent' && !String(c.c1).startsWith('ABSENT')) return false;
      if (cond==='c2-absent' && !String(c.c2).startsWith('ABSENT')) return false;
      if (cond==='c3-absent' && !String(c.c3).startsWith('ABSENT')) return false;
      if (cond==='c4-absent' && !String(c.c4).startsWith('ABSENT')) return false;
      if (cond==='c5-absent' && !String(c.c5).startsWith('ABSENT')) return false;
      if (cond==='suppression' && !c.suppressionConfirmed) return false;
      if (cond==='full-analysis' && !SLUG_TO_FILE[c.slug]) return false;
    }
    return true;
  });
  const grid = document.getElementById('caseGrid');
  const count = document.getElementById('resultsCount');
  if (!grid) return;
  count.textContent = `Showing ${filtered.length} of ${ALL_CASES.length} cases`;
  grid.innerHTML = filtered.map(c => {
    const dot = typeColor(c.type);
    const sc = scoreColor(c.gpws);
    const hasContent = !!SLUG_TO_FILE[c.slug];
    const conds = ['c1','c2','c3','c4','c5'].map((k,i) =>
      `<span class="cc ${String(c[k]).startsWith('ABSENT')?'cc-a':'cc-p'}">C${i+1}</span>`).join('');
    return `<div class="case-card" onclick="navigate('${c.slug}')">
      <div class="card-type-row">
        <div class="card-type-dot" style="background:${dot}"></div>
        <span class="card-type-label">${c.type}</span>
        <span class="card-domain-label">${c.domain}</span>
      </div>
      <div class="card-name">${c.name}</div>
      <div class="card-meta">${c.country}${c.deployYear?' · '+c.deployYear:''}</div>
      <div class="card-conditions">${conds}</div>
      <div class="card-bottom">
        <div class="card-score" style="color:${sc}">${c.gpws.toFixed(1)}</div>
        ${hasContent
          ? '<span class="card-link">Full analysis →</span>'
          : '<span class="card-data-link">Dataset record</span>'}
      </div>
    </div>`;
  }).join('');
}

function updateSearch(v) { filterState.search=v; filterAndRenderCards(); }
function setType(t,btn) {
  filterState.type=t;
  document.querySelectorAll('#typeChips .chip').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterAndRenderCards();
}
function setDomainGroup(v) {
  filterState.domainGroup = v;
  filterState.domain = 'all'; // reset subdomain when group changes
  // Update subdomain dropdown to show only subdomains for selected group
  const sub = document.getElementById('domainSelect');
  if (!sub) return;
  if (v === 'all') {
    sub.innerHTML = '<option value="all">All Subdomains</option>';
    sub.style.display = 'none';
  } else {
    const subs = DOMAIN_GROUPS[v] || [];
    sub.innerHTML = '<option value="all">All Subdomains</option>' +
      subs.map(d => `<option value="${d}">${d}</option>`).join('');
    sub.style.display = '';
    sub.value = 'all';
  }
  filterAndRenderCards();
}
function setDomain(v) {
  filterState.domain = v;
  filterAndRenderCards();
}
function toggleCond(c,btn) {
  btn.classList.toggle('active');
  filterState.conditions.has(c) ? filterState.conditions.delete(c) : filterState.conditions.add(c);
  filterAndRenderCards();
}

// ═══════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════
async function render() {
  const slug = getSlug();
  const app = document.getElementById('app');
  if (!slug) {
    app.innerHTML = renderLibrary();
    setTimeout(filterAndRenderCards, 0);
    return;
  }
  const dataCase = ALL_CASES.find(c => c.slug === slug);
  if (!dataCase) {
    app.innerHTML = `<div style="padding:120px 48px;text-align:center">
      <div style="font-family:var(--ff-mono);font-size:11px;color:var(--amber);letter-spacing:.2em;margin-bottom:16px">404 — NOT FOUND</div>
      <h1 style="font-family:var(--ff-display);font-size:48px;color:var(--cream);margin-bottom:20px">Case not found</h1>
      <p style="color:var(--warm);margin-bottom:28px">No record for "<strong>${slug}</strong>".</p>
      <button class="btn btn-ghost" onclick="navigate(null)">← Back to Case Library</button>
    </div>`;
    return;
  }
  // Show loading state while fetching content file
  if (SLUG_TO_FILE[slug]) {
    app.innerHTML = `<div class="loading"><div class="loading-text">Loading case record</div><div class="loading-bar"></div></div>`;
  }
  const content = await getContent(slug);
  app.innerHTML = content ? renderFullCase(dataCase, content) : renderDataPage(dataCase);
}

boot();
</script>
</body>
</html>
